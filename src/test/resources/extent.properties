# 1. ENABLING SPARK REPORTER (Changed from html to spark)
extent.reporter.spark.start=true
extent.reporter.spark.config=src/test/resources/extent-config.xml
extent.reporter.spark.out=target/extent-reports/

# 2. TIMESTAMPED RUN FOLDERS
basefolder.name=TestRun
basefolder.datetimepattern=yyyy-MM-dd_HH-mm-ss

# 3. SCREENSHOT STORAGE MATCH
# screenshot.dir=target/extent-reports/
# screenshot.rel.path=

# Base64 configuration (Removes the need for screenshot paths)
extent.reporter.spark.base64imagesrc=true